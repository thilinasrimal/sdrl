name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install CPU-only PyTorch (fast CI)
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install package + dev deps
        run: pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check sdrl/ scripts/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=sdrl --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build package
        run: |
          pip install build
          python -m build --wheel
